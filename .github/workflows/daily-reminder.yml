name: Daily Commit Reminder

on:
  schedule:
    # Runs at 08:00 UTC (8 AM) and 20:00 UTC (8 PM) every day
    - cron: '0 8 * * *'
    - cron: '0 20 * * *'
  
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  check-commits:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Check commits and send reminder
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_USERNAME: timo-t-q
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: npm run check