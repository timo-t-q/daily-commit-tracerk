name: Weekly Commit Summary

on:
  schedule:
    # Runs Saturday at 10:00 UTC (12 PM Budapest summer)
    - cron: '0 10 * * 6'
  
  workflow_dispatch:

jobs:
  weekly-summary:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Generate and send weekly summary
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_USERNAME: timo-t-q
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: node weekly-summary.js